server {
    if ($host = api.zonasurtech.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = facturas.zonasurtech.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = cms.zonasurtech.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.zonasurtech.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = zonasurtech.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name zonasurtech.online www.zonasurtech.online api.zonasurtech.online cms.zonasurtech.online facturas.zonasurtech.online;
    return 301 https://$host$request_uri;










}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.zonasurtech.online;
    ssl_certificate /etc/letsencrypt/live/zonasurtech.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zonasurtech.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    return 301 https://zonasurtech.online$request_uri;

}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zonasurtech.online;
    ssl_certificate /etc/letsencrypt/live/zonasurtech.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zonasurtech.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /ide {
        return 403;
    }

    location /docker {
        return 403;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}

