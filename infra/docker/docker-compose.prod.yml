services:
  web:
    container_name: vm-platform-web
    build:
      context: /opt/vm-platform
      dockerfile: /opt/vm-platform/apps/web/Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        - SUPABASE_URL=${SUPABASE_URL:-}
        - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://zonasurtech.online}
        - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL:-https://zonasurtech.online/dashboard}
        - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
        - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
        - JWT_SECRET=${JWT_SECRET:-}
        - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.zonasurtech.online}
    env_file: /opt/vm-platform/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    container_name: vm-platform-api
    build:
      context: /opt/vm-platform
      dockerfile: /opt/vm-platform/apps/api/Dockerfile
    env_file: /opt/vm-platform/.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOSTNAME=0.0.0.0
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
