# =============================================================================
# Task 4: Production Nginx Configuration — zonasurtech.online
# Fixes: www redirect, HSTS, static asset header control, font indexing,
#        *.txt 404 → 410 (resolves /auth/register.txt GSC issue)
# =============================================================================

# ---- Block 1: HTTP → HTTPS (hard redirect, both www and non-www) ----
server {
    listen 80;
    listen [::]:80;
    server_name zonasurtech.online www.zonasurtech.online;
    return 301 https://zonasurtech.online$request_uri;
}

# ---- Block 2: HTTPS www → HTTPS non-www (canonical redirect) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.zonasurtech.online;

    ssl_certificate /etc/letsencrypt/live/zonasurtech.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zonasurtech.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS on www too (before redirect)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    return 301 https://zonasurtech.online$request_uri;
}

# ---- Block 3: Main Application (canonical origin) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zonasurtech.online;

    ssl_certificate /etc/letsencrypt/live/zonasurtech.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zonasurtech.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/vcard
        text/vtt
        text/x-component;

    # -----------------------------------------------------------------------
    # Task 5: Fix 404 — block ALL *.txt files except robots.txt and sitemap.xml
    # Returns 410 Gone (tells Google to permanently deindex these URLs)
    # -----------------------------------------------------------------------
    location ~* \.txt$ {
        if ($request_uri !~ "^/(robots|sitemap)\.txt") {
            return 410;
        }
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # -----------------------------------------------------------------------
    # Task 6: Block /_next/static/* from being indexed
    # X-Robots-Tag tells Google not to index these assets
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;

        # Aggressive cache: hashed filenames change on deploy (immutable)
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;

        # Critical: prevent Google from indexing fonts/static files
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # -----------------------------------------------------------------------
    # Static asset cache (images, css, js served through Next.js)
    # -----------------------------------------------------------------------
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|avif|webp)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        # Prevent font files from being indexed
        add_header X-Robots-Tag "noindex" always;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Block sensitive internal tools from public access
    # -----------------------------------------------------------------------
    location /ide/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// $scheme://;
        # Basic auth or IP restriction recommended here
    }

    location /docker/ {
        proxy_pass https://127.0.0.1:9443/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_ssl_verify off;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # Main Application — all other routes proxied to Next.js
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # Security Headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Task 4: HSTS — forces HTTPS for 1 year (submit to HSTS preload list)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Permissions Policy
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(self)" always;

        # CSP — allows GTM, AdSense, Supabase
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://stats.g.doubleclick.net; frame-src 'self' https://googleads.g.doubleclick.net https://www.google.com; worker-src 'self' blob:;" always;
    }
}
